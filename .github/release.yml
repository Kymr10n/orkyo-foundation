# Categorises the auto-generated release notes (gh release create --generate-notes).
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Features
      labels: [feature, enhancement]
    - title: Fixes
      labels: [bug, fix]
    - title: Documentation
      labels: [documentation, docs]
    - title: Dependencies
      labels: [dependencies]
    - title: Other Changes
      labels: ["*"]
