name: Security Refresh

# Rebuilds the Keycloak image daily to pick up base image security patches.
# Runs independently of the main CI pipeline.

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC daily (after nightly CI at 02:00)
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  KC_IMAGE: ghcr.io/kymr10n/keycloak
  KC_VERSION: "26.6"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-keycloak-image:
    name: Refresh Keycloak Base Image
    timeout-minutes: 30
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build refreshed image (no-cache on KC base)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: keycloak
          push: true
          tags: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          # Force fresh pull of the Keycloak base image to pick up OS patches
          no-cache: true
          cache-to: type=gha,mode=max,scope=keycloak-security-refresh

      - name: Trivy — scan refreshed image
        id: trivy_scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: json
          output: trivy-results.json
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Evaluate Trivy findings
        id: trivy_results
        run: |
          if [ ! -s trivy-results.json ]; then
            echo "::error::Missing Trivy results file (trivy-results.json)"
            exit 1
          fi

          vuln_count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)
          echo "vulnerability_count=$vuln_count" >> "$GITHUB_OUTPUT"

          if [ "$vuln_count" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
            echo "Detected $vuln_count HIGH/CRITICAL vulnerability findings"
          else
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
            echo "No HIGH/CRITICAL vulnerabilities detected"
          fi

      - name: Create or reopen issue on vulnerability found
        if: steps.trivy_results.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = '🔒 Security: HIGH/CRITICAL CVEs in Keycloak base image';
            const body = [
              '## Vulnerability detected in Keycloak base image',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              '**Action required:**',
              '1. Review the Trivy scan output in the workflow run linked above',
              '2. Update the Keycloak base image version in `keycloak/Dockerfile` if a patched version is available',
              '3. Or add a time-bound exception to `.trivyignore` with a review date within 14 days',
              '',
              '_This issue is automatically reopened on each failed security refresh until resolved._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: ['security'],
              per_page: 10,
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              if (existing.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'open',
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Vulnerability still present as of ${new Date().toISOString()}.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security'],
              });
            }

      - name: Fail workflow if vulnerabilities found
        if: steps.trivy_results.outputs.has_vulnerabilities == 'true'
        run: exit 1
