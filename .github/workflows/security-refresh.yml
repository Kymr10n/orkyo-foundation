name: Security Refresh

# Rebuilds the Keycloak image daily to pick up base image security patches.
# Runs independently of the main CI pipeline.

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC daily (after nightly CI at 02:00)
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  KC_IMAGE: ghcr.io/kymr10n/keycloak
  KC_VERSION: "26.6"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-keycloak-image:
    name: Refresh Keycloak Base Image
    timeout-minutes: 30
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build refreshed image (no-cache on KC base)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: keycloak
          push: true
          tags: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          # Force fresh pull of the Keycloak base image to pick up OS patches
          no-cache: true
          cache-to: type=gha,mode=max,scope=keycloak-security-refresh

      - name: Trivy — scan refreshed image
        id: trivy_scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: json
          output: trivy-results.json
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Evaluate Trivy findings
        id: trivy_results
        run: |
          if [ ! -s trivy-results.json ]; then
            echo "::error::Missing Trivy results file (trivy-results.json)"
            exit 1
          fi

          crit_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          high_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          echo "critical_count=$crit_count" >> "$GITHUB_OUTPUT"
          echo "high_count=$high_count" >> "$GITHUB_OUTPUT"

          # Only CRITICAL findings escalate (issue + workflow failure). HIGH findings in the
          # upstream, digest-pinned Keycloak image are bundled by Keycloak and resolved only by
          # a base-image digest bump — they are surfaced here for visibility but do not gate, so
          # newly-disclosed HIGHs no longer force a .trivyignore edit just to get back to green.
          if [ "$crit_count" -gt 0 ]; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
            echo "Detected $crit_count CRITICAL finding(s) ($high_count HIGH)"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
            echo "No CRITICAL findings ($high_count HIGH)"
          fi

          # Full HIGH+CRITICAL picture in the job summary (visibility, non-gating).
          {
            echo "### Keycloak base image — security refresh scan"
            echo
            echo "- CRITICAL: ${crit_count}"
            echo "- HIGH: ${high_count}"
            echo
            if [ "$((crit_count + high_count))" -gt 0 ]; then
              echo "| Severity | Package | CVE | Installed | Fixed |"
              echo "|---|---|---|---|---|"
              jq -r '.Results[]?.Vulnerabilities[]? | "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "—") |"' trivy-results.json
              echo
              echo "_HIGHs are bundled by upstream Keycloak and resolved only by a base-image digest bump; tracked here but non-gating. CRITICALs open/reopen a tracking issue and fail this run._"
            else
              echo "No HIGH/CRITICAL findings. ✅"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or reopen issue on CRITICAL found
        if: steps.trivy_results.outputs.has_critical == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = '🔒 Security: CRITICAL CVEs in Keycloak base image';
            const body = [
              '## CRITICAL vulnerability detected in Keycloak base image',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              '**Action required:**',
              '1. Review the Trivy scan output (job summary lists every HIGH/CRITICAL finding)',
              '2. Bump the digest-pinned Keycloak base image in `keycloak/Dockerfile` if a patched release exists',
              '3. Otherwise make a conscious risk decision — document a time-bound exception in `.trivyignore` (review date within 14 days) only if the CVE is not reachable in our deployment',
              '',
              '_HIGH findings in the bundled upstream JARs are reported in the job summary but do not open an issue — they are resolved by a base-image digest bump, not independently patchable. This issue is reopened on each refresh while a CRITICAL remains._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: ['security'],
              per_page: 10,
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              if (existing.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'open',
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Vulnerability still present as of ${new Date().toISOString()}.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security'],
              });
            }

      - name: Fail workflow if CRITICAL found
        if: steps.trivy_results.outputs.has_critical == 'true'
        run: exit 1
