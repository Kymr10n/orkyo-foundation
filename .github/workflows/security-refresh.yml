name: Security Refresh

# Rebuilds the Keycloak image daily to pick up base image security patches.
# Runs independently of the main CI pipeline.

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC daily (after nightly CI at 02:00)
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  issues: write

env:
  REGISTRY: ghcr.io
  KC_IMAGE: ghcr.io/kymr10n/keycloak
  KC_VERSION: "26.6"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  refresh-keycloak-image:
    name: Refresh Keycloak Base Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build refreshed image (no-cache on KC base)
        uses: docker/build-push-action@v6
        with:
          context: keycloak
          push: true
          tags: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          # Force fresh pull of the Keycloak base image to pick up OS patches
          no-cache: true
          cache-to: type=gha,mode=max,scope=keycloak-security-refresh

      - name: Trivy — scan refreshed image
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.KC_IMAGE }}:${{ env.KC_VERSION }}-orkyo-security-refresh
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Create or reopen issue on vulnerability found
        if: steps.trivy.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const title = '🔒 Security: HIGH/CRITICAL CVEs in Keycloak base image';
            const body = [
              '## Vulnerability detected in Keycloak base image',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              '**Action required:**',
              '1. Review the Trivy scan output in the workflow run linked above',
              '2. Update the Keycloak base image version in `keycloak/Dockerfile` if a patched version is available',
              '3. Or add a time-bound exception to `.trivyignore` with a review date within 14 days',
              '',
              '_This issue is automatically reopened on each failed security refresh until resolved._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: ['security'],
              per_page: 10,
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              if (existing.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'open',
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Vulnerability still present as of ${new Date().toISOString()}.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security'],
              });
            }

      - name: Fail workflow if vulnerabilities found
        if: steps.trivy.outcome == 'failure'
        run: exit 1
