name: Publish NuGet packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Orkyo.Foundation.slnx

      - name: Build
        run: dotnet build Orkyo.Foundation.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Orkyo.Foundation.slnx -c Release --no-build --verbosity normal

      # Pack in dependency order: Shared → Foundation → Migrations
      - name: Pack Orkyo.Shared
        run: |
          dotnet pack backend/shared/Orkyo.Shared.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkgs

      - name: Pack Orkyo.Foundation
        run: |
          dotnet pack backend/src/Orkyo.Foundation.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkgs

      - name: Pack Orkyo.Migrations
        run: |
          dotnet pack backend/migrations/Orkyo.Migrations.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/Kymr10n/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
