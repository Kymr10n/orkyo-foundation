name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  backend:
    name: Build and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore backend/OrkyoFoundation.slnx

      - name: Build
        run: dotnet build backend/OrkyoFoundation.slnx -c Release --no-restore

      - name: Test
        run: dotnet test backend/OrkyoFoundation.slnx -c Release --no-build --verbosity normal
