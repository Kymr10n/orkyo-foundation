name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  backend:
    name: Build and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore Orkyo.Foundation.slnx

      - name: Build
        run: dotnet build Orkyo.Foundation.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Orkyo.Foundation.slnx -c Release --no-build --verbosity normal

  frontend-contracts:
    name: Validate frontend contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend contract dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend contracts
        run: npm run typecheck
        working-directory: frontend

      - name: Test frontend contracts
        run: npm test
        working-directory: frontend
