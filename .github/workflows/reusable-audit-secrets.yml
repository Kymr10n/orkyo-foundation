name: reusable / audit-secrets

# Extracted from the `audit-secrets` job — near-identical across:
#   - orkyo-foundation/.github/workflows/release-ci.yml @ 5144f8e9f6094fbd600045048bc84c605722c32d
#   - orkyo-saas/.github/workflows/release-ci.yml        @ 74bc01cc9211a4dcf48b3f3b36ac0d5bc64339ea
#   - orkyo-community/.github/workflows/release-ci.yml   @ ec14ac98c304f81a61600fc73d2a0ddf0ae85358
#
# Differences parameterized:
#   - `migration-lint-path` — the sql dir passed to lint-migration-headers.sh
#     (backend/migrations-foundation/sql | backend/migrations/sql | backend/migrations/sql)
#   - `run-iac-scan` — saas/community additionally run a Trivy IaC "config" scan
#     over the whole repo; foundation does not (no Terraform/compose to scan).
#
# COUPLING RULE: this is a `workflow_call` reusable workflow. It must never
# reference a local `./.github/actions/...` composite action — that breaks the
# CALLER with an undiagnosable startup_failure. Every third-party action below
# is pinned to the exact SHA the source jobs used. Consumers must pin their
# `uses:` to this file by commit SHA, never `@main`.
#
# Behavior must match the source job bodies byte-for-byte (module the two
# inputs above) at extraction time.

on:
  workflow_call:
    inputs:
      migration-lint-path:
        description: 'Path passed to scripts/ci/lint-migration-headers.sh'
        required: true
        type: string
      run-iac-scan:
        description: 'Run an additional Trivy IaC "config" scan over the whole repo (saas/community: true; foundation: false)'
        required: false
        type: boolean
        default: false

jobs:
  audit-secrets:
    name: audit / secrets + fs
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1

      - name: Trivy — IaC config scan
        if: inputs.run-iac-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_SKIP_JAVA_DB_UPDATE: "true"

      - name: Migration header lint
        run: bash scripts/ci/lint-migration-headers.sh ${{ inputs.migration-lint-path }}
