name: reusable / audit-npm

# Extracted from the `audit-npm` job — near-identical across:
#   - orkyo-foundation/.github/workflows/release-ci.yml @ 5144f8e9f6094fbd600045048bc84c605722c32d
#   - orkyo-saas/.github/workflows/release-ci.yml        @ 74bc01cc9211a4dcf48b3f3b36ac0d5bc64339ea
#   - orkyo-community/.github/workflows/release-ci.yml   @ ec14ac98c304f81a61600fc73d2a0ddf0ae85358
#
# Differences parameterized:
#   - `frontend-dir` — the working-directory for npm; all three currently use
#     'frontend', kept as an overridable default rather than hardcoded.
#   - `with-private-registry` + secrets.GHCR_TOKEN — saas/community configure
#     .npmrc for the private @kymr10n/foundation package; foundation has no
#     such dependency and omits it.
#   - `with-license-scan` — foundation and community run a license-checker
#     scan (open-source distribution requirement); saas does not.
#
# COUPLING RULE: this is a `workflow_call` reusable workflow. It must never
# reference a local `./.github/actions/...` composite action — that breaks the
# CALLER with an undiagnosable startup_failure. Every third-party action below
# is pinned to the exact SHA the source jobs used. Consumers must pin their
# `uses:` to this file by commit SHA, never `@main`.
#
# Behavior must match the source job bodies byte-for-byte (modulo the inputs
# above) at extraction time.

on:
  workflow_call:
    inputs:
      frontend-dir:
        description: 'Working directory for npm commands'
        required: false
        type: string
        default: 'frontend'
      with-private-registry:
        description: 'Configure .npmrc for the private @kymr10n/foundation GitHub Packages registry (requires secrets.GHCR_TOKEN)'
        required: false
        type: boolean
        default: false
      with-license-scan:
        description: 'Run a license-checker scan and fail on copyleft licenses (open-source distribution requirement)'
        required: false
        type: boolean
        default: false
    secrets:
      GHCR_TOKEN:
        description: 'Required when with-private-registry is true'
        required: false

jobs:
  audit-npm:
    name: audit / npm
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: Configure npm for GitHub Packages (@kymr10n/foundation)
        if: inputs.with-private-registry
        run: |
          echo "@kymr10n:registry=https://npm.pkg.github.com" > ${{ inputs.frontend-dir }}/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GHCR_TOKEN }}" >> ${{ inputs.frontend-dir }}/.npmrc

      - name: Install frontend deps
        run: npm ci
        working-directory: ${{ inputs.frontend-dir }}

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
        working-directory: ${{ inputs.frontend-dir }}

      - name: License scan
        if: inputs.with-license-scan
        run: |
          npx --yes license-checker@^25.0.1 \
            --summary \
            --excludePrivatePackages \
            --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0"
        working-directory: ${{ inputs.frontend-dir }}
