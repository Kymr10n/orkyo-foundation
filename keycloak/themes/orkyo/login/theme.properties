# Orkyo Login Theme
# Custom FreeMarker templates with minimal dark design

parent=base
import=common/keycloak

# Disable PatternFly — orkyo.css is a standalone stylesheet and PatternFly
# global rules (link colors, resets) interfere with our custom components.
stylesCommon=
styles=css/orkyo.css css/orkyo_extra.css

# Orkyo app URL for "Request access" link
# This is overridden by the client's baseUrl if available.
# Override at deploy time via KC_SPI_THEME_DEFAULT_orkyoAppUrl env var,
# or by setting the client's baseUrl in the Keycloak realm configuration.
orkyoAppUrl=https://orkyo.com
