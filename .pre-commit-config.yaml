# Run before commit: pre-commit run --all-files
# Install: pip install pre-commit && pre-commit install
#
# Replaces the bespoke .githooks/pre-push. Pre-commit's selling point is that
# the same config drives every dev — no "works on my machine" because someone
# forgot to install Node, etc. The dotnet hook is local because dotnet-format
# is best invoked through the installed SDK rather than a pre-commit shim.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '(\.md|backend/migrations.*/sql/.*\.sql)$'
      - id: end-of-file-fixer
        exclude: 'packages\.lock\.json$'
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=512']
        exclude: 'backend/seeding/Floorplans/Assets/.*\.png$'
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: dotnet-restore-lock
        name: dotnet restore (sync lock files)
        entry: bash -c 'dotnet restore Orkyo.Foundation.slnx --locked-mode 2>/dev/null || { dotnet restore Orkyo.Foundation.slnx && git diff --name-only -- "*/packages.lock.json" | while IFS= read -r f; do [ -n "$(tail -c1 "$f")" ] && printf "\n" >> "$f"; git add "$f"; done; }'
        language: system
        pass_filenames: false
        files: '\.csproj$|packages\.lock\.json$|\.slnx$'

      - id: dotnet-format
        name: dotnet format (auto-fix)
        entry: bash -c 'dotnet format Orkyo.Foundation.slnx --no-restore && git diff --name-only --diff-filter=M "*.cs" | xargs --no-run-if-empty git add'
        language: system
        pass_filenames: false
        files: '\.cs$|\.csproj$|\.slnx$'

      - id: frontend-lint
        name: frontend eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx|js|jsx)$'

      - id: frontend-typecheck
        name: frontend tsc --noEmit
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx)$'

      - id: frontend-test
        name: frontend vitest
        entry: bash -c 'cd frontend && npm test'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: backend-test
        name: backend dotnet test
        entry: bash -c 'dotnet test Orkyo.Foundation.slnx --no-restore --verbosity quiet'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
